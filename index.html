<!DOCTYPE html>
<html>
<head>

<title>Smart Inventory Tracking and Control System</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#EEF2F7;
}

.header{
background:linear-gradient(90deg,#1E3A8A,#2563EB);
color:white;
padding:18px;
font-size:26px;
font-weight:bold;
text-align:center;
}

.login-container{
width:360px;
margin:70px auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
text-align:center;
}

.login-container input{
width:90%;
padding:12px;
margin:10px;
border:1px solid #ddd;
border-radius:6px;
}

.login-container button{
padding:12px 20px;
background:#2563EB;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.sidebar{
width:220px;
height:100vh;
background:linear-gradient(180deg,#0F172A,#1E3A8A);
color:white;
position:fixed;
padding:20px;
}

.sidebar button{
width:100%;
padding:12px;
margin-top:12px;
background:#3B82F6;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.main{
margin-left:240px;
padding:25px;
}

.card{
background:white;
padding:20px;
margin:10px;
display:inline-block;
width:210px;
border-radius:10px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
text-align:center;
}

.low{
color:#DC2626;
font-weight:bold;
}

table{
background:white;
border-collapse:collapse;
width:100%;
}

th{
background:#2563EB;
color:white;
}

th,td{
padding:12px;
text-align:center;
}

.chart-container{
width:500px;
height:300px;
margin-top:20px;
}

.delete{background:#DC2626;}
.update{background:#16A34A;}

</style>

</head>

<body>

<div class="header">
Smart Inventory Tracking and Control System
</div>

<!-- LOGIN -->

<div id="loginPage" class="login-container">

<h2>Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p>New user?
<a href="#" onclick="showRegister()">Register</a>
</p>

</div>

<!-- REGISTER -->

<div id="registerPage" class="login-container" style="display:none;">

<h2>Register</h2>

<input type="text" id="regName" placeholder="Name">
<input type="email" id="regEmail" placeholder="Email">
<input type="password" id="regPass" placeholder="Password">

<button onclick="register()">Register</button>

<p>Already have account?
<a href="#" onclick="showLogin()">Login</a>
</p>

</div>

<!-- HOME -->

<div id="homePage" style="display:none;">

<div class="sidebar">

<h2>Menu</h2>

<button onclick="showSection('dashboard')">Dashboard</button>
<button onclick="showSection('inventory')">Inventory</button>
<button onclick="logout()">Logout</button>

</div>

<div class="main">

<div id="dashboard" class="section">

<h1>Dashboard</h1>

<div class="card">
<h3>Total Items</h3>
<h2 id="totalItems">0</h2>
</div>

<div class="card">
<h3>Low Stock</h3>
<h2 id="lowStock">0</h2>
</div>

<div class="card">
<h3>Total Quantity</h3>
<h2 id="totalQty">0</h2>
</div>

<div class="chart-container">
<canvas id="myChart"></canvas>
</div>

</div>

<div id="inventory" class="section" style="display:none;">

<h1>Inventory Management</h1>

<input type="text" id="search" placeholder="Search Item" onkeyup="search()"><br>

<input type="text" id="name" placeholder="Item Name">
<input type="text" id="supplier" placeholder="Supplier Name">
<input type="number" id="qty" placeholder="Quantity">

<button onclick="addItem()">Add Item</button>

<table border="1" id="table"></table>

</div>

</div>

</div>

<script>

/* ==========================
   MAIN INVENTORY SYSTEM
========================== */

let users = JSON.parse(localStorage.getItem("users")) || [];
let items = JSON.parse(localStorage.getItem("items")) || [];

let chart;

function register(){

let name=document.getElementById("regName").value;
let email=document.getElementById("regEmail").value;
let pass=document.getElementById("regPass").value;

if(name==""||email==""||pass==""){
alert("Fill all details");
return;
}

users.push({name,email,pass});

localStorage.setItem("users",JSON.stringify(users));

alert("Registration Successful");

showLogin();

}

function login(){

let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;

let user=users.find(u=>u.email==email && u.pass==pass);

if(user){

document.getElementById("loginPage").style.display="none";
document.getElementById("homePage").style.display="block";

loadDashboard();
showItems();

}else{

alert("Invalid Login");

}

}

function showRegister(){
document.getElementById("loginPage").style.display="none";
document.getElementById("registerPage").style.display="block";
}

function showLogin(){
document.getElementById("registerPage").style.display="none";
document.getElementById("loginPage").style.display="block";
}

function logout(){
location.reload();
}

function showSection(section){

document.querySelectorAll(".section")
.forEach(sec=>sec.style.display="none");

document.getElementById(section).style.display="block";

}

function addItem(){

let name=document.getElementById("name").value;
let supplier=document.getElementById("supplier").value;
let qty=document.getElementById("qty").value;

if(name==""||supplier==""||qty==""){
alert("Enter all details");
return;
}

let id="INV"+(items.length+1);

items.push({
id,
name,
supplier,
qty,
date:new Date().toLocaleString()
});

if(qty<10){
alert("⚠ Low Stock Item Added");
}

localStorage.setItem("items",JSON.stringify(items));

showItems();
loadDashboard();

}

function showItems(){

let table=document.getElementById("table");

table.innerHTML=`
<tr>
<th>ID</th>
<th>Name</th>
<th>Supplier</th>
<th>Qty</th>
<th>Status</th>
<th>Date</th>
<th>Update</th>
<th>Delete</th>
</tr>
`;

items.forEach((item,i)=>{

let status=item.qty<10 ?
"<span class='low'>Low Stock</span>" : "OK";

table.innerHTML+=`

<tr>
<td>${item.id}</td>
<td>${item.name}</td>
<td>${item.supplier}</td>
<td>${item.qty}</td>
<td>${status}</td>
<td>${item.date}</td>

<td><button class="update" onclick="updateItem(${i})">Update</button></td>
<td><button class="delete" onclick="deleteItem(${i})">Delete</button></td>

</tr>

`;

});

}

function updateItem(i){

let qty=prompt("Enter Quantity",items[i].qty);

items[i].qty=qty;

localStorage.setItem("items",JSON.stringify(items));

showItems();
loadDashboard();

}

function deleteItem(i){

items.splice(i,1);

localStorage.setItem("items",JSON.stringify(items));

showItems();
loadDashboard();

}

function search(){

let value=document.getElementById("search").value.toLowerCase();

document.querySelectorAll("#table tr").forEach((row,index)=>{

if(index==0)return;

row.style.display=row.innerText.toLowerCase().includes(value) ? "" : "none";

});

}

function loadDashboard(){

document.getElementById("totalItems").innerText=items.length;

let low=items.filter(i=>i.qty<10).length;

document.getElementById("lowStock").innerText=low;

let totalQty=items.reduce((sum,i)=>sum+Number(i.qty),0);

document.getElementById("totalQty").innerText=totalQty;

loadChart();

}

function loadChart(){

let low=items.filter(i=>i.qty<10).length;
let ok=items.filter(i=>i.qty>=10).length;

if(chart) chart.destroy();

chart=new Chart(document.getElementById("myChart"),{

type:"pie",

data:{
labels:["Low Stock","OK Stock"],
datasets:[{
data:[low,ok],
backgroundColor:["#DC2626","#2563EB"]
}]
}

});

}

/* ==========================
   DSA CONCEPTS (STATUS 3)
========================== */

console.log("----- DSA DEMO -----");

/* ARRAY */

let inventoryArray=["Laptop","Mouse","Keyboard","Monitor"];
console.log("Array:",inventoryArray);

/* STACK */

let stack=[];

stack.push("Laptop");
stack.push("Mouse");
stack.push("Keyboard");

console.log("Stack after push:",stack);

stack.pop();

console.log("Stack after pop:",stack);

/* QUEUE */

let queue=[];

queue.push("Order1");
queue.push("Order2");
queue.push("Order3");

console.log("Queue:",queue);

queue.shift();

console.log("Queue after dequeue:",queue);

/* LINEAR SEARCH */

function linearSearch(arr,target){

for(let i=0;i<arr.length;i++){

if(arr[i]==target){
return i;
}

}

return -1;

}

console.log("Linear Search Index:",
linearSearch(inventoryArray,"Keyboard"));

/* BUBBLE SORT */

function bubbleSort(arr){

for(let i=0;i<arr.length;i++){

for(let j=0;j<arr.length-i-1;j++){

if(arr[j]>arr[j+1]){

let temp=arr[j];
arr[j]=arr[j+1];
arr[j+1]=temp;

}

}

}

return arr;

}

let nums=[80,20,50,10];

console.log("Bubble Sort Result:",bubbleSort(nums));

</script>

</body>
</html>
